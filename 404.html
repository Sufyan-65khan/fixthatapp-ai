<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - FixThatApp</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 1.5rem;
        }
        header a { color: white; text-decoration: none; font-size: 1.3rem; font-weight: bold; }
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-box h1 { font-size: 5rem; color: #667eea; margin-bottom: 0.5rem; }
        .error-box h2 { font-size: 1.5rem; color: #333; margin-bottom: 1rem; }
        .error-box p { color: #666; margin-bottom: 2rem; max-width: 500px; }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #5a6fd6; }
        footer { text-align: center; padding: 1.5rem; color: #999; font-size: 0.85rem; }
        footer a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <header><a href="/index.html">FixThatApp</a></header>
    <div class="content">
        <div class="error-box">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The troubleshooting guide you're looking for doesn't exist or may have been moved. Browse our 100+ guides to find what you need.</p>
            <a class="btn" href="/index.html">Browse All Guides</a>
        </div>
    </div>
    <footer>&copy; 2026 FixThatApp. All rights reserved. | <a href="/privacy-policy.html">Privacy Policy</a></footer>
</body>
</html>
